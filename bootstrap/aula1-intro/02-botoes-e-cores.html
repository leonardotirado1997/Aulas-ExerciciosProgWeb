<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 1.2 - Botões e Cores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main class="container py-5">
        <h1 class="h2 mb-4">Aula 1.2 - Botões e Cores</h1>
        <section class="mb-4">
            <h2 class="h5 mb-3">Botões Principais</h2>
            <button class="btn btn-primary me-2">Primario</button>
            <button class="btn btn-success me-2">Sucesso</button>
            <button class="btn btn-danger me-2">Perigo</button>
            <button class="btn btn-warning text-dark">Aviso</button>
        </section>

        <section class="mb-4">
            <h2 class="h5 mb-3">Botões Outline</h2>
            <button class="btn btn-outline-primary me-2">Outline Primario</button>
            <button class="btn btn-outline-secondary me-2">Outline Secundario</button>
        </section>

        <section>
            <h2 class="h5 mb-3">Cores de texto e fundo</h2>
            <p class="text-primary">Texto com cor primaria</p>
            <p class="text-danger">Texto com cor de alerta</p>
            <div class="bg-info text-dark p-3 rounded mb-2">Fundo info com texto escuro</div>
            <div class="bg-dark text-white p-3 rounded">Fundo escuro com texto claro</div>
        </section>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
