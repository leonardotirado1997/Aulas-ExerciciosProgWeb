<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>

</head>

<body>
    <h1>Informações Pessoais</h1>
    <form action="">
        <fieldset>
            <legend>Cadastro de Cliente</legend>
            <p><label for="">Nome:</label>
                <input type="text" name="nome" id="nome" size="50" maxlength="100" placeholder="Digite seu nome">
            </p>

            <p><label for="">Idade:</label>
                <input type="text" name="idade" id="idade" size="10" maxlength="4" placeholder="Digite a idade">
            </p>
            <p><label for="">Endereço:</label>
                <input type="text" name="endereco" id="endereco" size="80" maxlength="100"
                    placeholder="Digite o endereço">
            </p>
            <p><label for="">Cidade:</label>
                <input type="text" name="cidade" id="cidade" size="50" maxlength="100" placeholder="Digite a cidade">
            </p>
            <p><label for="">Estado:</label>
                <input type="text" name="estado" id="estadp" size="2" maxlength="3" placeholder="UF">
            </p>
            <p><label for="">CEP:</label>
                <input type="text" name="cep" id="cep" size="10" maxlength="20" placeholder="XXXXX-XXX">
            </p>
            <p><label for="">Tel/Res</label>
                <input type="text" name="tel_res" id="tel_res" size="12" maxlength="13" placeholder="(41) 3 3333-3333">
            </p>
            <p><label for="">Tel/Cel:</label>
                <input type="text" name="tel_cel" id="tel_cel" size="12" maxlength="13" placeholder="(41) 9 9999-9999">
            </p>
            <p><label for="">Email:</label>
                <input type="text" name="email" id="email" size="80" maxlength="60"
                    placeholder="Digite o endereço de email">
            </p>
        </fieldset>
        <input type="submit" value="Enviar">
    </form>

</body>

</html>
